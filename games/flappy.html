<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Flappy Bird — PIXELZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="noise"></div>
<div class="game-page">
  <div class="game-header">
    <a href="../index.html">← Back</a>
    <h1>🐦 Flappy Bird</h1>
  </div>
  <div class="game-area">
    <div class="game-ui">
      <span class="score-label">SCORE</span><span class="score-val" id="score">0</span>
      <span class="score-label">BEST</span><span class="score-val" id="best">0</span>
    </div>
    <div class="game-canvas-wrap">
      <canvas id="gameCanvas" width="360" height="560"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="oTitle">FLAPPY</h2>
        <p id="oMsg">Tap, click, or press Space to flap</p>
        <button class="game-btn" id="startBtn">Start Game</button>
      </div>
    </div>
    <p class="game-hint">Click / Tap / Space to flap</p>
  </div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const PIPE_W=60,PIPE_GAP=160,GRAVITY=0.45,FLAP=-8,PIPE_SPEED=2.8;

let bird,pipes,score,best=0,running=false,animId,frameCount;

function initGame(){
  bird={x:80,y:H/2,vy:0,r:18};
  pipes=[];score=0;frameCount=0;
  document.getElementById('score').textContent=0;
}

function flap(){
  if(!running){startGame();return;}
  bird.vy=FLAP;
}

function startGame(){
  initGame();
  document.getElementById('overlay').classList.add('hidden');
  running=true;
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function addPipe(){
  const top=80+Math.random()*(H-PIPE_GAP-160);
  pipes.push({x:W,top,bottom:top+PIPE_GAP,scored:false});
}

function drawBG(){
  // sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#134e5e');g.addColorStop(1,'#71b280');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#5d4037';ctx.fillRect(0,H-40,W,40);
  ctx.fillStyle='#4caf50';ctx.fillRect(0,H-40,W,8);
}

function drawPipe(p){
  const g1=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
  g1.addColorStop(0,'#2e7d32');g1.addColorStop(.5,'#4caf50');g1.addColorStop(1,'#1b5e20');
  ctx.fillStyle=g1;
  // top pipe
  ctx.fillRect(p.x,0,PIPE_W,p.top);
  ctx.fillRect(p.x-6,p.top-24,PIPE_W+12,24);
  // bottom pipe
  ctx.fillRect(p.x,p.bottom,PIPE_W,H-p.bottom);
  ctx.fillRect(p.x-6,p.bottom,PIPE_W+12,24);
  ctx.fillStyle='rgba(255,255,255,.1)';
  ctx.fillRect(p.x+8,0,8,p.top);
  ctx.fillRect(p.x+8,p.bottom,8,H-p.bottom);
}

function drawBird(){
  const{x,y,vy}=bird;
  const angle=Math.max(-0.4,Math.min(0.8,vy*0.05));
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  // body
  ctx.fillStyle='#ffd32a';ctx.shadowColor='#ffd32a';ctx.shadowBlur=12;
  ctx.beginPath();ctx.ellipse(0,0,bird.r,bird.r-4,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // wing
  ctx.fillStyle='#e67e22';ctx.beginPath();ctx.ellipse(-4,4,10,6,0.3,0,Math.PI*2);ctx.fill();
  // eye
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(8,-4,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(10,-4,3,0,Math.PI*2);ctx.fill();
  // beak
  ctx.fillStyle='#e67e22';ctx.beginPath();ctx.moveTo(18,-2);ctx.lineTo(28,0);ctx.lineTo(18,4);ctx.closePath();ctx.fill();
  ctx.restore();
}

function update(){
  bird.vy+=GRAVITY;bird.y+=bird.vy;
  frameCount++;
  if(frameCount%80===0)addPipe();
  pipes.forEach(p=>p.x-=PIPE_SPEED);
  pipes=pipes.filter(p=>p.x>-PIPE_W-20);
  // score
  pipes.forEach(p=>{
    if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;document.getElementById('score').textContent=score;}
  });
  // collision
  if(bird.y+bird.r>H-40||bird.y-bird.r<0){gameOver();return;}
  for(const p of pipes){
    if(bird.x+bird.r-6>p.x&&bird.x-bird.r+6<p.x+PIPE_W){
      if(bird.y-bird.r+4<p.top||bird.y+bird.r-4>p.bottom){gameOver();return;}
    }
  }
}

function gameOver(){
  running=false;
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  document.getElementById('oTitle').textContent='GAME OVER';
  document.getElementById('oMsg').textContent=`Score: ${score}`;
  document.getElementById('overlay').classList.remove('hidden');
}

function loop(){
  if(!running)return;
  update();
  drawBG();
  pipes.forEach(drawPipe);
  drawBird();
  // score on canvas
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(W/2-40,16,80,40,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px "Bebas Neue"';ctx.textAlign='center';ctx.fillText(score,W/2,44);
  animId=requestAnimationFrame(loop);
}

// Initial draw
drawBG();initGame();drawBird();

document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{if(e.code==='Space'){flap();e.preventDefault();}});
canvas.addEventListener('click',flap);
canvas.addEventListener('touchstart',e=>{flap();e.preventDefault();},{passive:false});
</script>
</body>
</html>
