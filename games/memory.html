<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Memory Match — PIXELZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:400px;width:100%;}
    .mem-card{aspect-ratio:1;border-radius:10px;cursor:pointer;perspective:600px;}
    .mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s;}
    .mem-card.flipped .mem-card-inner,.mem-card.matched .mem-card-inner{transform:rotateY(180deg);}
    .mem-face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;}
    .mem-front{background:var(--surface);border:1px solid var(--border);}
    .mem-front::after{content:'?';font-family:var(--font-display);font-size:1.8rem;color:var(--text-muted);}
    .mem-back{background:var(--bg2);border:1px solid var(--accent);transform:rotateY(180deg);font-size:2rem;}
    .mem-card.matched .mem-back{background:rgba(232,255,71,.08);border-color:var(--accent);box-shadow:0 0 12px rgba(232,255,71,.2);}
    .memory-info{display:flex;gap:2rem;align-items:center;font-family:var(--font-mono);font-size:.8rem;}
  </style>
</head>
<body>
<div class="noise"></div>
<div class="game-page">
  <div class="game-header">
    <a href="../index.html">← Back</a>
    <h1>🃏 Memory Match</h1>
  </div>
  <div class="game-area">
    <div class="memory-info">
      <span><span class="score-label">MOVES </span><span class="score-val" id="moves">0</span></span>
      <span><span class="score-label">TIME </span><span class="score-val" id="timer">0:00</span></span>
      <span><span class="score-label">PAIRS </span><span class="score-val" id="pairs">0/8</span></span>
      <button class="game-btn" id="restartBtn">New Game</button>
    </div>
    <div class="memory-grid" id="grid"></div>
    <p class="game-hint">Find all matching pairs</p>
  </div>
</div>
<script>
const EMOJIS=['🎮','🚀','⚡','🎯','💎','🔥','🌈','👾','🏆','🎪','🦄','🍭','🎲','🎸','🌸','🦊'];
const PAIRS=8;
let cards=[],flipped=[],matched=0,moves=0,timerInt,seconds=0,canFlip=true,started=false;

function shuffle(arr){return arr.sort(()=>Math.random()-.5);}

function buildGrid(){
  clearInterval(timerInt);
  cards=[];flipped=[];matched=0;moves=0;seconds=0;started=false;canFlip=true;
  document.getElementById('moves').textContent=0;
  document.getElementById('timer').textContent='0:00';
  document.getElementById('pairs').textContent='0/'+PAIRS;

  const selected=shuffle([...EMOJIS]).slice(0,PAIRS);
  const deck=shuffle([...selected,...selected]);

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  deck.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='mem-card';
    card.dataset.emoji=emoji;
    card.dataset.index=i;
    card.innerHTML=`<div class="mem-card-inner"><div class="mem-face mem-front"></div><div class="mem-face mem-back">${emoji}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
    cards.push(card);
  });
}

function startTimer(){
  timerInt=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60),s=seconds%60;
    document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  },1000);
}

function flipCard(card){
  if(!canFlip||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(!started){started=true;startTimer();}
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    canFlip=false;
    setTimeout(checkMatch,600);
  }
}

function checkMatch(){
  const[a,b]=flipped;
  if(a.dataset.emoji===b.dataset.emoji){
    a.classList.add('matched');b.classList.add('matched');
    matched++;document.getElementById('pairs').textContent=`${matched}/${PAIRS}`;
    if(matched===PAIRS){clearInterval(timerInt);setTimeout(()=>alert(`🎉 You won!\n${moves} moves · ${document.getElementById('timer').textContent}`),300);}
  }else{
    a.classList.remove('flipped');b.classList.remove('flipped');
  }
  flipped=[];canFlip=true;
}

document.getElementById('restartBtn').addEventListener('click',buildGrid);
buildGrid();
</script>
</body>
</html>
