<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pong — PIXELZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="noise"></div>
<div class="game-page">
  <div class="game-header">
    <a href="../index.html">← Back</a>
    <h1>🏓 Pong</h1>
  </div>
  <div class="game-area">
    <div class="game-canvas-wrap">
      <canvas id="gameCanvas" width="600" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="oTitle">PONG</h2>
        <p id="oMsg">W/S = Player 1 &nbsp;·&nbsp; ↑/↓ = Player 2 (or AI)</p>
        <button class="game-btn" id="vsAI">vs AI</button>
        <button class="game-btn secondary" id="vs2P">2 Players</button>
      </div>
    </div>
    <p class="game-hint">First to 7 wins · W/S = Left Paddle &nbsp;·&nbsp; ↑/↓ = Right Paddle</p>
  </div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const PAD_W=12,PAD_H=80,BALL_S=10,WIN=7,PAD_SPEED=5;

let p1,p2,ball,score,running=false,vsAI=true,animId,keys={};

function init(){
  p1={x:20,y:H/2-PAD_H/2};
  p2={x:W-20-PAD_W,y:H/2-PAD_H/2};
  ball={x:W/2,y:H/2,dx:(Math.random()>.5?1:-1)*4,dy:(Math.random()>.5?1:-1)*3};
  score={p1:0,p2:0};
}

function draw(){
  ctx.fillStyle='#0c0c0e';ctx.fillRect(0,0,W,H);
  // dashes
  ctx.setLineDash([10,10]);ctx.strokeStyle='#2a2a30';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // score
  ctx.font='72px "Bebas Neue"';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.fillText(score.p1,W/4,H/2+28);ctx.fillText(score.p2,3*W/4,H/2+28);
  // labels
  ctx.font='11px "Space Mono"';ctx.fillStyle='#555';ctx.letterSpacing='.1em';
  ctx.fillText('PLAYER 1',W/4,20);ctx.fillText(vsAI?'AI':'PLAYER 2',3*W/4,20);
  // paddles
  [[p1,'#e8ff47'],[p2,'#ff4757']].forEach(([p,c])=>{
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=16;
    ctx.beginPath();ctx.roundRect(p.x,p.y,PAD_W,PAD_H,PAD_W/2);ctx.fill();
    ctx.shadowBlur=0;
  });
  // ball
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.8)';ctx.shadowBlur=20;
  ctx.beginPath();ctx.roundRect(ball.x-BALL_S/2,ball.y-BALL_S/2,BALL_S,BALL_S,2);ctx.fill();
  ctx.shadowBlur=0;
}

function update(){
  // p1
  if(keys['w']||keys['W'])p1.y=Math.max(0,p1.y-PAD_SPEED);
  if(keys['s']||keys['S'])p1.y=Math.min(H-PAD_H,p1.y+PAD_SPEED);
  // p2
  if(vsAI){
    const mid=p2.y+PAD_H/2;
    const diff=ball.y-mid;
    p2.y+=Math.sign(diff)*Math.min(Math.abs(diff),PAD_SPEED*.85);
    p2.y=Math.max(0,Math.min(H-PAD_H,p2.y));
  }else{
    if(keys['ArrowUp'])p2.y=Math.max(0,p2.y-PAD_SPEED);
    if(keys['ArrowDown'])p2.y=Math.min(H-PAD_H,p2.y+PAD_SPEED);
  }
  ball.x+=ball.dx;ball.y+=ball.dy;
  // walls
  if(ball.y<BALL_S/2){ball.y=BALL_S/2;ball.dy=Math.abs(ball.dy);}
  if(ball.y>H-BALL_S/2){ball.y=H-BALL_S/2;ball.dy=-Math.abs(ball.dy);}
  // paddle hit
  function hitPad(p){
    if(ball.x-BALL_S/2<=p.x+PAD_W&&ball.x+BALL_S/2>=p.x&&ball.y+BALL_S/2>=p.y&&ball.y-BALL_S/2<=p.y+PAD_H){
      const hit=(ball.y-(p.y+PAD_H/2))/(PAD_H/2);
      const ang=hit*60*(Math.PI/180);
      const speed=Math.min(10,Math.sqrt(ball.dx*ball.dx+ball.dy*ball.dy)+.15);
      return{dx:Math.sign(ball.dx)*-1*speed*Math.cos(ang),dy:speed*Math.sin(ang)};
    }
    return null;
  }
  let r;
  if(ball.dx<0&&(r=hitPad(p1))){ball.dx=Math.abs(r.dx);ball.dy=r.dy;}
  if(ball.dx>0&&(r=hitPad(p2))){ball.dx=-Math.abs(r.dx);ball.dy=r.dy;}
  // score
  if(ball.x<0){score.p2++;checkWin();resetBall(1);}
  if(ball.x>W){score.p1++;checkWin();resetBall(-1);}
}

function resetBall(dir){
  ball={x:W/2,y:H/2,dx:dir*4,dy:(Math.random()>.5?1:-1)*3};
}

function checkWin(){
  if(score.p1>=WIN||score.p2>=WIN){
    running=false;
    const winner=score.p1>=WIN?(vsAI?'PLAYER 1':'PLAYER 1'):( vsAI?'AI':'PLAYER 2');
    document.getElementById('oTitle').textContent=winner+' WINS';
    document.getElementById('oMsg').textContent=`${score.p1} — ${score.p2}`;
    document.getElementById('overlay').classList.remove('hidden');
  }
}

function loop(){
  if(!running)return;
  update();draw();animId=requestAnimationFrame(loop);
}

function startGame(ai){
  vsAI=ai;init();
  document.getElementById('overlay').classList.add('hidden');
  running=true;cancelAnimationFrame(animId);animId=requestAnimationFrame(loop);
}

document.getElementById('vsAI').addEventListener('click',()=>startGame(true));
document.getElementById('vs2P').addEventListener('click',()=>startGame(false));
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

init();draw();
</script>
</body>
</html>
